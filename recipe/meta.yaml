{% set version = "0.1.43" %}
{% set sha256 = "abc702511c4e268da49c22fd97c83de355c559f3271e0798a6b67964be3d8248" %}

package:
  name: python-debian
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/p/python-debian/python-debian-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps -vv"

requirements:
  host:
    - pip
    - python
    - wheel
    - setuptools
  run:
    - chardet
    - python
    - six

test:
  imports:
    - debian
    - debian_bundle
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://salsa.debian.org/python-debian-team/python-debian
  license: GPL-2.0-or-later
  license_file: gpl-3.0.txt
  license_family: GPL
  summary: Debian package related modules
  doc_url: https://python-debian-team.pages.debian.net/python-debian/
  dev_url: https://salsa.debian.org/python-debian-team/python-debian

extra:
  recipe-maintainers:
    - mbargull
